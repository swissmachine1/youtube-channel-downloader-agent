services:
  - type: web
    name: yt-summarize
    runtime: python
    buildCommand: pip install .
    startCommand: yt-summarize-web
    envVars:
      - key: OUTPUT_DIR
        value: /tmp/yt-summarize/output
      - key: CACHE_DIR
        value: /tmp/yt-summarize/cache
      - key: PYTHON_VERSION
        value: "3.11.0"
